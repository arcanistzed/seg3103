name: CI

# Continuous Integration: run both automated test suites on every push and PR.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  python-tests:
    name: Python tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python-backend/coverage.xml
          if-no-files-found: ignore

  js-tests:
    name: JavaScript tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js-backend
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Jest with coverage
        run: npm test

      - name: Upload JS coverage
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: js-backend/coverage
          if-no-files-found: ignore
